<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    <script src="js/utileria.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="contenedor-formulario">
        <h1>Iniciar Sesión</h1>

        <label>Correo electrónico</label>
        <input type="text" id="correo" oninput="validarcorreo()" placeholder="Ingrese su correo">
        <span id="error-correo"></span>
        <br>

        <label>Contraseña</label>
        <input type="password" id="contraseña" oninput="contraseña()" placeholder="Ingrese su contraseña">
        <span id="error-contraseña"></span>
        <span id="exito-contraseña"></span>
        <br>

        <button class="boton-verificar" type="submit">Ingresar</button>
    </div>
</body>

</html>
